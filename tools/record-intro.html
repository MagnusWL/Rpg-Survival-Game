<!DOCTYPE html>
<html>
<!--
  Films the three intro effects once each, on a virtual clock, as LOOPS.

  Same studio as record-tear.html - the kit's own engine draws every frame,
  with performance.now, Date.now, requestAnimationFrame and devicePixelRatio
  replaced before construction - but where the tear was a one-shot, these
  are loops, and each engine gets the camera treatment its mathematics asks
  for:

  fire  - the glow pulse is two sines in a 5:2 ratio with a common period of
          4021.2387 ms. We film exactly one period in 100 frames, so the
          last frame's glow phase IS the first frame's. The flames and
          embers are random flicker; a cut between two random states reads
          as flicker. Warmed 4 s first so the grid and embers are populated
          on frame 0.
  eyes  - purely sinusoidal, but the component periods only meet every 39 s,
          too long to bake. Instead the harness samples the brightness curve
          (seed pinned to 0) and SEARCHES for the window whose value and
          slope match at both ends; the packer crossfades the residue.
  fog   - deterministic noise drift, no period at all: the packer will
          crossfade the first second against the tail. One trap is baked
          into the engines' loop(): dt is clamped to 50 ms, so a 100 ms
          frame step would halve the drift speed. The fog is therefore
          cranked TWICE 50 ms between exposures - honest sim, 10 fps film.

  Geometry: the drawn card rectangle on the port's 390x844 screen. Cover
  fits 941x1672 art by height: scale 0.504785, so the canvas is 475x844 and
  overhangs the screen left and right exactly as the picture does.

  Serve with: node tools/record-server.mjs
  Open: /tools/record-intro.html?fx=fire  (then eyes, then fog)
-->
<body style="background:#111;color:#ddd;font-family:monospace">
<div id="log">starter...</div>
<canvas id="c" style="border:1px solid #333;background:#222"></canvas>
<script type="module">
  const log = (m) => { document.getElementById('log').textContent = m; };
  const fx = new URLSearchParams(location.search).get('fx') || 'fire';

  // --- The virtual clock, installed before any engine exists --------------
  let vnow = 0;
  const rafQueue = [];
  performance.now = () => vnow;
  Date.now = () => 1700000000000;
  window.requestAnimationFrame = (cb) => { rafQueue.push(cb); return rafQueue.length; };
  window.cancelAnimationFrame = () => {};
  Object.defineProperty(window, 'devicePixelRatio', { value: 1 });
  const pump = () => { const q = rafQueue.splice(0); for (const cb of q) cb(vnow); };

  // --- The drawn card box: 941x1672 cover-fitted onto 390x844 -------------
  const CW = 475, CH = 844;
  const canvas = document.getElementById('c');
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  canvas.style.maxWidth = 'none';

  const post = async (name, i, frames) => {
    const data = canvas.toDataURL('image/png');
    await fetch(`/frame?name=${name}&i=${i}`, { method: 'POST', body: data });
    log(`${name}: billede ${i + 1}/${frames}  (t=${Math.round(vnow)}ms)`);
  };
  const meta = (name, obj) =>
    fetch(`/meta?name=${name}`, { method: 'POST', body: JSON.stringify(obj, null, 2) });

  if (fx === 'fire') {
    const { PixelCampfire } = await import('/vendor/intro-campfire/campfire-engine.js');
    new PixelCampfire({ canvas, bgWidth: 941, bgHeight: 1672 });
    // Warm the automaton and the ember field with honest 50 ms steps
    // (loop() clamps dt at 50 ms - larger steps would slow the sim).
    for (let i = 0; i < 80; i++) { vnow += 50; pump(); }
    // One exact glow period: 2*pi*640 ms of engine time in 100 frames.
    const PERIOD = 2 * Math.PI * 640;
    const FRAMES = 100;
    const STEP = PERIOD / FRAMES; // 40.2124 ms, safely under the dt clamp
    for (let i = 0; i < FRAMES; i++) {
      pump();
      await post('introfire', i, FRAMES);
      vnow += STEP;
    }
    await meta('introfire', { fps: 25, frames: FRAMES, cf: 0, periodMs: PERIOD, canvas: { W: CW, H: CH } });
    log(`introfire: faerdig - ${FRAMES} billeder, praecis een gloede-periode`);

  } else if (fx === 'eyes') {
    const { MonsterEyes } = await import('/vendor/intro-monster/monster-eyes.js');
    const eyes = new MonsterEyes({ canvas, bgWidth: 941, bgHeight: 1672 });
    eyes.seed = 0; // known phase, so the search below matches what is filmed

    // The engine's brightness curve, restated only to CHOOSE the cut - the
    // shipped pixels all come from the engine. lvl(t) drives every gradient
    // linearly, so matching lvl and lvl' at both ends makes a clean loop.
    const lvl = (sec) => {
      const t = sec * 1.6;
      const waver = 0.55 * Math.sin(t * 2.1) + 0.28 * Math.sin(t * 5.3 + 1.7) + 0.17 * Math.sin(t * 11.0 + 0.5);
      const dip = 0.9 + 0.1 * Math.sin(t * 0.7);
      return Math.max(0, dip * 0.25 * (1 + 0.45 * waver));
    };
    const FPS = 15, CF = 4;
    let best = { E: Infinity, a: 2, k: 90 };
    for (let k = 75; k <= 135; k++) { // window length in whole frames: 5..9 s
      const L = k / FPS;
      for (let a = 2; a <= 30; a += 1 / 60) {
        const d = 1 / 1000;
        const va = lvl(a), vb = lvl(a + L);
        const sa = (lvl(a + d) - va) / d, sb = (lvl(a + L + d) - vb) / d;
        const E = Math.abs(vb - va) + 0.15 * Math.abs(sb - sa);
        if (E < best.E) best = { E, a, k };
      }
    }
    const FRAMES = best.k + CF;
    vnow = best.a * 1000;
    for (let i = 0; i < FRAMES; i++) {
      pump();
      await post('introeyes', i, FRAMES);
      vnow += 1000 / FPS;
    }
    await meta('introeyes', { fps: FPS, frames: FRAMES, cf: CF, loop: best, canvas: { W: CW, H: CH } });
    log(`introeyes: faerdig - ${best.k}+${CF} billeder fra t=${best.a.toFixed(2)}s (E=${best.E.toFixed(5)})`);

  } else {
    const { PixelFog } = await import('/vendor/intro-fog/fog-engine.js');
    new PixelFog({ canvas, bgWidth: 941, bgHeight: 1672 });
    // 10 fps film, but the drift stays true: two honest 50 ms cranks per
    // exposure, because loop() clamps dt and a 100 ms step would halve it.
    const FPS = 10, N = 60, CF = 10;
    const FRAMES = N + CF;
    for (let i = 0; i < FRAMES; i++) {
      vnow += 50; pump();
      vnow += 50; pump();
      await post('introfog', i, FRAMES);
    }
    await meta('introfog', { fps: FPS, frames: FRAMES, cf: CF, canvas: { W: CW, H: CH } });
    log(`introfog: faerdig - ${N}+${CF} billeder @ ${FPS} fps`);
  }
</script>
</body>
</html>
